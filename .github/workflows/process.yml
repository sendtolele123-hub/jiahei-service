name: Jiahei email processor

on:
  schedule:
    - cron: '* * * * *'  # 每分钟（GitHub Actions 实际可能延迟到 ~5min）
  workflow_dispatch:      # 也允许手动触发调试

concurrency:
  group: jiahei-processor
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run processor
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          JIAHEI_INBOX: ${{ secrets.JIAHEI_INBOX }}
        run: python process.py
